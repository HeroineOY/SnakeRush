<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnakeRush</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <p class="label">分数</p>
          <strong id="score">0</strong>
        </div>
        <div>
          <p class="label">最高</p>
          <strong id="best">0</strong>
        </div>
        <div>
          <p class="label">等级</p>
          <strong id="level">1</strong>
        </div>
        <div>
          <p class="label">连击</p>
          <strong id="combo">x1</strong>
        </div>
      </section>

      <section class="stage" aria-label="SnakeRush 游戏区域">
        <canvas id="game" width="640" height="640"></canvas>
        <div class="overlay is-visible" id="overlay">
          <h1>SnakeRush</h1>
          <p id="message">按开始进入街机挑战</p>
          <button class="primary-button" id="startButton" type="button">开始</button>
        </div>
      </section>

      <section class="control-bar" aria-label="游戏控制">
        <button class="tool-button" id="pauseButton" type="button">暂停</button>
        <button class="tool-button" id="restartButton" type="button">重开</button>
        <button class="sound-button" id="soundButton" type="button" aria-label="声音">声</button>
      </section>

      <section class="dpad" aria-label="方向控制">
        <button class="direction up" data-dir="up" type="button" aria-label="向上">▲</button>
        <button class="direction left" data-dir="left" type="button" aria-label="向左">◀</button>
        <button class="direction right" data-dir="right" type="button" aria-label="向右">▶</button>
        <button class="direction down" data-dir="down" type="button" aria-label="向下">▼</button>
      </section>
    </main>

    <script src="game.js" defer></script>
  </body>
</html>
