<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SnakeRush 是一款霓虹街机风贪吃蛇游戏，支持多模式、难度选择、连击得分、特殊食物、排行榜和移动端滑动控制。"
    />
    <title>SnakeRush</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <p class="label">分数</p>
          <strong id="score">0</strong>
        </div>
        <div>
          <p class="label">最佳</p>
          <strong id="best">0</strong>
        </div>
        <div>
          <p class="label">等级</p>
          <strong id="level">1</strong>
        </div>
        <div>
          <p class="label">连击</p>
          <strong id="combo">x1</strong>
        </div>
      </section>

      <section class="stage" id="stage" aria-label="SnakeRush 游戏区域">
        <canvas id="game" width="640" height="640"></canvas>
        <div class="overlay is-visible" id="overlay">
          <div class="overlay-content">
            <p class="eyebrow" id="overlayEyebrow">v0.2 Arcade Update</p>
            <h1>SnakeRush</h1>
            <p id="message">选择模式和难度，开始你的霓虹连击挑战。</p>

            <div class="menu-grid" id="menuGrid">
              <section class="menu-section" aria-label="模式选择">
                <div class="menu-heading">
                  <span>模式</span>
                  <small id="modeHint">Classic</small>
                </div>
                <div class="segmented" id="modePicker">
                  <button type="button" data-mode="classic">经典</button>
                  <button type="button" data-mode="rush">冲刺</button>
                  <button type="button" data-mode="portal">传送</button>
                  <button type="button" data-mode="wall">电网</button>
                  <button type="button" data-mode="zen">禅意</button>
                </div>
              </section>

              <section class="menu-section" aria-label="难度选择">
                <div class="menu-heading">
                  <span>难度</span>
                  <small id="difficultyHint">Normal</small>
                </div>
                <div class="segmented compact" id="difficultyPicker">
                  <button type="button" data-difficulty="chill">轻松</button>
                  <button type="button" data-difficulty="normal">标准</button>
                  <button type="button" data-difficulty="hard">硬核</button>
                </div>
              </section>

              <section class="menu-section food-guide" aria-label="特殊食物">
                <div class="menu-heading">
                  <span>特殊食物</span>
                  <small>Power Food</small>
                </div>
                <div class="food-list">
                  <span><i style="--food:#95ff66"></i>普通</span>
                  <span><i style="--food:#ff4fd8"></i>浆果</span>
                  <span><i style="--food:#ffd166"></i>金币</span>
                  <span><i style="--food:#5fe6ff"></i>减速</span>
                  <span><i style="--food:#b985ff"></i>双倍</span>
                  <span><i style="--food:#ff5d4d"></i>毒果</span>
                </div>
              </section>

              <section class="menu-section" aria-label="排行榜预览">
                <div class="menu-heading">
                  <span>本地排行</span>
                  <small id="boardTitle">Top 5</small>
                </div>
                <ol class="leaderboard" id="leaderboard"></ol>
              </section>
            </div>

            <div class="summary" id="summary" aria-live="polite"></div>
            <button class="primary-button" id="startButton" type="button">开始游戏</button>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="游戏控制与状态">
        <section class="control-bar" aria-label="游戏控制">
          <button class="tool-button" id="pauseButton" type="button">暂停</button>
          <button class="tool-button" id="restartButton" type="button">重开</button>
          <button class="tool-button boost-button" id="boostButton" type="button">冲刺</button>
          <button class="sound-button" id="soundButton" type="button" aria-label="声音">声</button>
        </section>

        <section class="run-card" aria-label="当前设置">
          <div>
            <span>当前模式</span>
            <strong id="currentMode">经典</strong>
          </div>
          <div>
            <span>当前难度</span>
            <strong id="currentDifficulty">标准</strong>
          </div>
          <div>
            <span>存活时间</span>
            <strong id="timer">00:00</strong>
          </div>
          <div>
            <span>冲刺能量</span>
            <div class="meter" aria-hidden="true"><i id="boostMeter"></i></div>
          </div>
        </section>

        <section class="dpad" aria-label="方向控制">
          <button class="direction up" data-dir="up" type="button" aria-label="向上">▲</button>
          <button class="direction left" data-dir="left" type="button" aria-label="向左">◀</button>
          <button class="direction right" data-dir="right" type="button" aria-label="向右">▶</button>
          <button class="direction down" data-dir="down" type="button" aria-label="向下">▼</button>
        </section>
      </aside>
    </main>

    <script src="game.js" defer></script>
  </body>
</html>
